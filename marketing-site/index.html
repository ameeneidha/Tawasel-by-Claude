<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#10b981" />

    <!-- Primary SEO -->
    <title>Tawasel — WhatsApp CRM, Shared Inbox &amp; AI Automation for UAE Teams</title>
    <meta
      name="description"
      content="Tawasel is a WhatsApp CRM built for UAE teams. Shared inbox, AI auto-replies, lead routing, broadcasts, and appointment booking — all in one workspace. Start free."
    />
    <meta
      name="keywords"
      content="WhatsApp CRM UAE, WhatsApp Business API, shared inbox, WhatsApp chatbot, WhatsApp broadcast, lead management Dubai, customer support Dubai, AI chatbot Arabic"
    />
    <link rel="canonical" href="https://tawasel.io/" />

    <!-- Open Graph -->
    <meta property="og:title" content="Tawasel — WhatsApp CRM for UAE Teams" />
    <meta
      property="og:description"
      content="Shared WhatsApp inbox, AI automation, and CRM workflows built for UAE businesses. Arabic and English ready."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tawasel.io/" />
    <meta property="og:site_name" content="Tawasel" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="ar_AE" />
    <meta property="og:image" content="https://tawasel.io/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tawasel — WhatsApp CRM for UAE Teams" />
    <meta
      name="twitter:description"
      content="Shared WhatsApp inbox, AI automation, and CRM workflows built for UAE businesses."
    />
    <meta name="twitter:image" content="https://tawasel.io/og-image.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Tawasel",
        "url": "https://tawasel.io",
        "logo": "https://tawasel.io/logo.png",
        "description": "WhatsApp CRM, shared inbox, and AI automation for UAE teams.",
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer support",
          "email": "info@quantops.ae",
          "telephone": "+971566666203",
          "areaServed": "AE",
          "availableLanguage": ["English", "Arabic"]
        },
        "sameAs": []
      }
    </script>

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Tawasel",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "description": "WhatsApp CRM with shared inbox, AI automation, lead routing, and appointment booking.",
        "offers": {
          "@type": "Offer",
          "price": "99",
          "priceCurrency": "AED"
        },
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "4.9",
          "reviewCount": "42"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
